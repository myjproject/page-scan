<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM 诊断 Demo</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">LLM Demo</p>
        <h1>LLM 诊断插件</h1>
        <p class="subtitle">保留原始抓取流程，并把完整 JSON 直接发给分析后端，再把 LLM 结果显示在插件里。</p>
      </header>

      <section class="panel controls">
        <button id="captureBtn" class="secondary">只抓取当前页面</button>
        <button id="analyzeBtn" class="primary">抓取并分析</button>
        <button id="downloadBtn" class="secondary" disabled>导出 JSON</button>
        <label class="endpoint-field">
          <span>分析接口</span>
          <input id="endpointInput" type="text" value="http://localhost:3001/analyze-status-log" />
        </label>
        <p id="status" class="status">等待抓取</p>
      </section>

      <section class="panel">
        <h2>提取结果</h2>
        <dl class="facts">
          <div><dt>页面类型</dt><dd id="pageType">-</dd></div>
          <div><dt>当前子页</dt><dd id="activeTab">-</dd></div>
          <div><dt>任务 ID</dt><dd id="taskId">-</dd></div>
          <div><dt>用户名</dt><dd id="username">-</dd></div>
          <div><dt>状态</dt><dd id="taskStatus">-</dd></div>
          <div><dt>日志片段</dt><dd id="logPreview">-</dd></div>
          <div><dt>YAML 片段</dt><dd id="yamlPreview">-</dd></div>
        </dl>
      </section>

      <section class="panel">
        <h2>LLM 分析</h2>
        <textarea id="analysis" readonly placeholder="点“抓取并分析”后，这里会显示 LLM 返回内容"></textarea>
      </section>

      <section class="panel">
        <h2>完整快照</h2>
        <textarea id="snapshot" readonly placeholder="抓取结果会显示在这里"></textarea>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
